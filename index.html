<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忆江南cp — 爱的足迹👣</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header-overlay"></div>
    <div class="header-content">
      <h1 class="site-title"></h1>
      <p class="site-subtitle"></p>
      <div class="days-counter">
        <span class="commemoration">纪念日 2024年4月9日</span>
        <div class="days-row">
          <span class="days-number"></span>
          <span class="days-label">天</span>
        </div>
      </div>
    </div>
    <div class="header-decoration">
      <span class="floating-heart">💕</span>
      <span class="floating-heart">💖</span>
      <span class="floating-heart">✨</span>
      <span class="floating-heart">💗</span>
      <span class="floating-heart">🌟</span>
    </div>
  </header>

  <!-- Big Day 提醒 -->
  <div class="bigday-bar" id="bigdayBar">
    <!-- JS 渲染 -->
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar-inner">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索我们的故事...">
        <button class="search-clear" id="searchClear" aria-label="清除搜索">&times;</button>
      </div>
      <div class="tag-filters" id="tagFilters">
        <!-- 分类筛选按钮由 JS 渲染 -->
      </div>
    </div>
  </div>

  <!-- 三栏布局 -->
  <div class="main-layout">

    <!-- 左侧：美图合集 -->
    <aside class="sidebar sidebar-left" id="gallerySidebar">
      <!-- 最新动态 -->
      <div class="gallery-panel feed-panel" id="feedPanel" hidden>
        <h3 class="gallery-title">📡 最新动态</h3>
        <div class="feed-list" id="feedList"></div>
        <p class="feed-updated" id="feedUpdated"></p>
      </div>

      <div class="gallery-panel">
        <h3 class="gallery-title">🐈🐕‍🦺合照</h3>

        <!-- 图片网格 -->
        <div class="gallery-grid" id="galleryGrid"></div>

        <!-- 空状态 -->
        <div class="gallery-empty" id="galleryEmpty" hidden>
        </div>
      </div>
    </aside>

    <!-- 中间：时间线 -->
    <main class="timeline" id="timeline">
      <!-- 时间线条目由 JS 渲染 -->
    </main>

    <!-- 右侧：关注链接 -->
    <aside class="sidebar sidebar-right" id="linksSidebar">
      <div class="links-panel">
        <h3 class="links-title">📱 主页动态</h3>

        <!-- 微博卡片 -->
        <div class="platform-card weibo-card">
          <div class="platform-header">🔵 微博</div>
          <div class="platform-links">
            <a class="plink-item" href="https://m.weibo.cn/p/1008087f9f4377e6f95c313d4c2019adb1c82f" target="_blank" rel="noopener">💬 忆江南cp超话</a>
            <a class="plink-item" href="https://weibo.com/u/6207844884" target="_blank" rel="noopener">🌸 南南</a>
            <a class="plink-item" href="https://weibo.com/u/7915358411" target="_blank" rel="noopener">🌟 小江</a>
          </div>
        </div>

        <!-- 平台两栏 -->
        <div class="platform-row">
          <!-- 抖音卡片 -->
          <div class="platform-card half">
            <div class="platform-header">🎵 抖音</div>
            <div class="platform-links">
              <a class="plink-item" href="https://www.douyin.com/user/MS4wLjABAAAAbY-P2k3HKZ8_aJXenEdJpRBW3yldUYN-VAkzucwRi24" target="_blank" rel="noopener">🌸 南南</a>
              <a class="plink-item" href="https://www.douyin.com/user/MS4wLjABAAAAwLq6euIvZ4xpdGf4BQzh3zxlvmnqlNMUPOfy1ClbsMk" target="_blank" rel="noopener">🌟 小江</a>
            </div>
          </div>

          <!-- 小红书卡片 -->
          <div class="platform-card half">
            <div class="platform-header">📕 小红书</div>
            <div class="platform-links">
              <a class="plink-item" href="https://www.xiaohongshu.com/user/profile/5604f1e6e4b1cf3ec7c681aa" target="_blank" rel="noopener">🌸 南南</a>
              <a class="plink-item" href="https://www.xiaohongshu.com/user/profile/594d505250c4b46b76bcacf6" target="_blank" rel="noopener">🌟 小江</a>
            </div>
          </div>
        </div>
      </div>
    </aside>

  </div>

  <!-- No Results -->
  <div class="no-results" id="noResults" hidden>
    <p class="no-results-emoji">🔍</p>
    <p class="no-results-text">没有找到匹配 "<span id="noResultsQuery"></span>" 的记录</p>
    <p class="no-results-hint">试试其他关键词或清除筛选条件</p>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" hidden>
    <div class="lightbox-backdrop"></div>
    <button class="lightbox-close" aria-label="关闭">&times;</button>
    <button class="lightbox-prev" aria-label="上一张">‹</button>
    <button class="lightbox-next" aria-label="下一张">›</button>
    <div class="lightbox-content">
      <img src="" alt="" id="lightboxImg">
      <div class="lightbox-counter" id="lightboxCounter"></div>
    </div>
  </div>

  <!-- Back to Top -->
  <button class="back-to-top" id="backToTop" title="回到顶部">⬆</button>

  <!-- Footer -->
  <footer class="footer">
    <p>💕 我们的故事，未完待续 💕</p>
  </footer>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/feeds.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/tags.js"></script>
  <script src="js/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
