<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layout Test</title>
<style>
  body { margin: 0; background: #FFF8F5; }
  .main-layout {
    display: flex;
    gap: 24px;
    max-width: 1300px;
    margin: 0 auto;
    padding: 20px;
  }
  .sidebar-left {
    width: 260px;
    flex-shrink: 0;
    background: #fff;
    padding: 16px;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .timeline {
    flex: 1;
    min-width: 0;
    background: #fff;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
  .sidebar-right {
    width: 290px;
    flex-shrink: 0;
    background: #fff;
    padding: 16px;
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>
<div class="main-layout">
  <aside class="sidebar-left">
    <h3>🖼️ 美图合集</h3>
    <p>左侧栏</p>
  </aside>
  <main class="timeline">
    <h3>时间线</h3>
    <p>中间栏</p>
  </main>
  <aside class="sidebar-right">
    <h3>💌 留言板</h3>
    <p>右侧栏</p>
  </aside>
</div>
</body>
</html>
