name: 抓取最新动态

on:
  schedule:
    - cron: '0 12,18,23 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 启动 RSSHub
        run: |
          docker run -d --name rsshub -p 1200:1200 diygod/rsshub:latest
          sleep 15

      - name: 抓取南南微博
        run: curl -s -m 30 "http://localhost:1200/weibo/user/7817829627?format=json" > /tmp/nannan-weibo.json 2>&1 || echo '{"items":[]}' > /tmp/nannan-weibo.json

      - name: 抓取小江微博
        run: curl -s -m 30 "http://localhost:1200/weibo/user/7664743621?format=json" > /tmp/xiaojiang-weibo.json 2>&1 || echo '{"items":[]}' > /tmp/xiaojiang-weibo.json

      - name: 抓取南南抖音
        run: curl -s -m 30 "http://localhost:1200/douyin/user/MS4wLjABAAAAbY-P2k3HKZ8_aJXenEdJpRBW3yldUYN-VAkzucwRi24?format=json" > /tmp/nannan-douyin.json 2>&1 || echo '{"items":[]}' > /tmp/nannan-douyin.json

      - name: 抓取小江抖音
        run: curl -s -m 30 "http://localhost:1200/douyin/user/MS4wLjABAAAAwLq6euIvZ4xpdGf4BQzh3zxlvmnqlNMUPOfy1ClbsMk?format=json" > /tmp/xiaojiang-douyin.json 2>&1 || echo '{"items":[]}' > /tmp/xiaojiang-douyin.json

      - name: 抓取南南小红书
        run: curl -s -m 30 "http://localhost:1200/xiaohongshu/user/5604f1e6e4b1cf3ec7c681aa/notes?format=json" > /tmp/nannan-xhs.json 2>&1 || echo '{"items":[]}' > /tmp/nannan-xhs.json

      - name: 抓取小江小红书
        run: curl -s -m 30 "http://localhost:1200/xiaohongshu/user/594d505250c4b46b76bcacf6/notes?format=json" > /tmp/xiaojiang-xhs.json 2>&1 || echo '{"items":[]}' > /tmp/xiaojiang-xhs.json

      - name: 停止 RSSHub
        run: docker stop rsshub

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 抓取忆江南cp超话 (cloudscraper)
        run: python scripts/fetch-supertopic.py

      - name: 生成 feeds.js
        run: node scripts/build-feeds.js

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/feeds.js
          git diff --staged --quiet || git commit -m "自动更新最新动态" && git push || true
