name: 抓取最新动态

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时
  workflow_dispatch:          # 手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 启动 RSSHub
        run: |
          docker run -d --name rsshub -p 1200:1200 rsshub/rsshub:latest
          sleep 10

      - name: 抓取南南微博
        run: |
          curl -s -m 30 "http://localhost:1200/weibo/user/7817829627?format=json" > /tmp/nannan.json 2>&1 || echo '{"items":[]}' > /tmp/nannan.json

      - name: 抓取小江微博
        run: |
          curl -s -m 30 "http://localhost:1200/weibo/user/7664743621?format=json" > /tmp/xiaojiang.json 2>&1 || echo '{"items":[]}' > /tmp/xiaojiang.json

      - name: 停止 RSSHub
        run: docker stop rsshub

      - name: 生成 feeds.js
        run: node scripts/build-feeds.js

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/feeds.js
          git diff --staged --quiet || git commit -m "自动更新最新动态" && git push || true
